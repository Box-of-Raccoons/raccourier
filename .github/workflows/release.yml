name: Release

# Builds the installers and publishes them to a GitHub Release.
# - Push a version tag (e.g. `git tag v1.0.0 && git push origin v1.0.0`) to build
#   AND publish to the matching release.
# - Run manually (workflow_dispatch) to build both platforms and upload the
#   installers as run artifacts WITHOUT publishing — useful for verifying a branch.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_args: "--win"
          - os: macos-latest
            build_args: "--mac"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build installer (${{ matrix.os }})
        run: npx electron-builder ${{ matrix.build_args }} --publish ${{ github.event_name == 'push' && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing/notarization is a follow-up; build unsigned for now.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifacts (manual runs only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: raccourier-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.yml
          if-no-files-found: ignore
