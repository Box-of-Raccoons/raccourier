<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
    <link rel="stylesheet" href="styles.css" />
    <title>Raccourier</title>
  </head>
  <body>
    <header>
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="oklch(0.16 0.01 165)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="5" width="18" height="14" rx="2.5" fill="oklch(0.99 0.01 95)" />
            <path d="M3.5 7.5l8.5 6 8.5-6" />
          </svg>
        </span>
        <span class="wordmark"><span class="r">R</span>accourier</span>
      </div>
      <div class="actions">
        <div id="status" class="status" role="status" aria-live="polite" data-tone="idle" hidden>
          <span class="status-dot" aria-hidden="true"></span>
          <span class="status-text"></span>
        </div>
        <button id="mark-all" class="btn-ghost" type="button">Mark all read</button>
        <button id="clear" class="btn-ghost btn-clear" type="button">Clear</button>
      </div>
    </header>

    <main id="list" role="list" aria-live="polite" aria-label="Notifications"></main>

    <div id="undo" class="undo" role="alert" hidden>
      <span class="undo-label"></span>
      <button class="undo-btn" type="button">Undo</button>
    </div>

    <div id="empty" class="empty" hidden>
      <span class="glyph" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 8.5l9-5 9 5v7l-9 5-9-5z" />
          <path d="M3 8.5l9 5 9-5" />
          <path d="M12 13.5V19" />
        </svg>
      </span>
      <h2>No deliveries yet</h2>
      <p>Raccourier will drop your alerts right here.</p>
    </div>

    <script src="vendor/marked.js"></script>
    <script src="vendor/purify.min.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
